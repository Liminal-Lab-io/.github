<svg width="900" height="320" viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgCoreL" cx="450" cy="160" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="50%" stop-color="#FAFAFE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </radialGradient>
    <radialGradient id="glowOrbL1" cx="200" cy="100" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrbL2" cx="700" cy="220" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="markGL" cx="76" cy="108" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4C0889"/>
      <stop offset="20%" stop-color="#5B21B6"/>
      <stop offset="45%" stop-color="#6D28D9"/>
      <stop offset="70%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
    <linearGradient id="wordmarkGL" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="50%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="taglineGL" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="accentLineL" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="markBlurL" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gapBlurL" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="outer"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="inner"/>
      <feMerge><feMergeNode in="outer"/><feMergeNode in="inner"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="borderGL" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect width="900" height="320" rx="16" fill="url(#bgCoreL)"/>
  <rect width="900" height="320" rx="16" fill="url(#glowOrbL1)"/>
  <rect width="900" height="320" rx="16" fill="url(#glowOrbL2)"/>

  <!-- Faint dots for texture -->
  <circle cx="120" cy="45" r="0.8" fill="#8B5CF6" fill-opacity="0.12"/>
  <circle cx="340" cy="28" r="0.6" fill="#6366F1" fill-opacity="0.10"/>
  <circle cx="520" cy="55" r="0.9" fill="#8B5CF6" fill-opacity="0.08"/>
  <circle cx="760" cy="38" r="0.5" fill="#A78BFA" fill-opacity="0.12"/>
  <circle cx="830" cy="80" r="0.7" fill="#8B5CF6" fill-opacity="0.08"/>
  <circle cx="60" cy="180" r="0.6" fill="#6366F1" fill-opacity="0.08"/>
  <circle cx="180" cy="260" r="0.8" fill="#8B5CF6" fill-opacity="0.06"/>
  <circle cx="400" cy="290" r="0.5" fill="#A78BFA" fill-opacity="0.10"/>
  <circle cx="650" cy="275" r="0.7" fill="#6366F1" fill-opacity="0.08"/>
  <circle cx="820" cy="250" r="0.5" fill="#8B5CF6" fill-opacity="0.10"/>

  <!-- Logo mark -->
  <g transform="translate(330, 55) scale(0.9)" filter="url(#markBlurL)">
    <rect x="14" y="8" width="18" height="100" rx="4" fill="url(#markGL)"/>
    <rect x="38" y="114" width="56" height="18" rx="4" fill="url(#markGL)"/>
  </g>
  <g transform="translate(330, 55) scale(0.9)" filter="url(#gapBlurL)">
    <circle cx="35" cy="118" r="2" fill="#5B21B6" fill-opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="440" y="118" font-family="'Sora', 'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" letter-spacing="-0.02em" fill="url(#wordmarkGL)">Liminal Labs</text>

  <!-- Tagline -->
  <text x="450" y="155" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" letter-spacing="0.03em" fill="url(#taglineGL)">Talk with your system. Evolve without limits.</text>

  <!-- Accent line -->
  <line x1="350" y1="178" x2="550" y2="178" stroke="url(#accentLineL)" stroke-width="1"/>

  <!-- Description -->
  <text x="450" y="210" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" fill="#6D28D9" fill-opacity="0.55">
    <tspan x="450" dy="0">Describe changes in plain English. Preview instantly.</tspan>
    <tspan x="450" dy="22">Ship with confidence. No code required.</tspan>
  </text>

  <!-- Tech badges -->
  <g transform="translate(248, 252)">
    <rect x="0" y="0" width="68" height="26" rx="13" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="0.8"/>
    <text x="34" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6D28D9">Next.js</text>
    <rect x="78" y="0" width="58" height="26" rx="13" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="0.8"/>
    <text x="107" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6D28D9">React</text>
    <rect x="146" y="0" width="86" height="26" rx="13" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="0.8"/>
    <text x="189" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6D28D9">TypeScript</text>
    <rect x="242" y="0" width="78" height="26" rx="13" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="0.8"/>
    <text x="281" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6D28D9">Supabase</text>
    <rect x="330" y="0" width="58" height="26" rx="13" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="0.8"/>
    <text x="359" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6D28D9">Stripe</text>
  </g>

  <!-- Border -->
  <rect width="900" height="320" rx="16" fill="none" stroke="url(#borderGL)" stroke-width="1"/>
</svg>

<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlowL" cx="400" cy="80" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="markGlowL" cx="46" cy="108" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="15%" stop-color="#6D28D9"/>
      <stop offset="35%" stop-color="#7C3AED"/>
      <stop offset="60%" stop-color="#8B5CF6"/>
      <stop offset="85%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </radialGradient>
    <filter id="markBlurL" x="-40%" y="-25%" width="180%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gapGlowL" x="-800%" y="-800%" width="1700%" height="1700%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="outer"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="inner"/>
      <feMerge>
        <feMergeNode in="outer"/>
        <feMergeNode in="inner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="12" fill="#FAFAFE"/>
  <rect width="800" height="160" rx="12" fill="url(#bgGlowL)"/>
  <rect width="800" height="160" rx="12" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>

  <!-- Logo mark -->
  <g transform="translate(28, 30)" filter="url(#markBlurL)">
    <rect x="14" y="8" width="14" height="76" rx="3" fill="url(#markGlowL)"/>
    <rect x="33" y="90" width="42" height="14" rx="3" fill="url(#markGlowL)"/>
  </g>
  <g transform="translate(28, 30)" filter="url(#gapGlowL)">
    <circle cx="46" cy="108" r="1.5" fill="#5B21B6" fill-opacity="0.75"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="72" font-family="'Sora', 'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="url(#textGradL)">
    Liminal Labs
  </text>

  <!-- Tagline -->
  <text x="120" y="102" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#6D28D9" fill-opacity="0.65">
    Talk with your system. Evolve without limits.
  </text>
</svg>

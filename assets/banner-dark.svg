<svg width="900" height="320" viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradients -->
    <radialGradient id="bgCore" cx="450" cy="160" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#160050"/>
      <stop offset="40%" stop-color="#07001F"/>
      <stop offset="100%" stop-color="#010009"/>
    </radialGradient>
    <radialGradient id="glowOrb1" cx="200" cy="100" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb2" cx="700" cy="220" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb3" cx="450" cy="160" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo gradients -->
    <radialGradient id="markG" cx="76" cy="108" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="8%" stop-color="#F5F3FF"/>
      <stop offset="22%" stop-color="#DDD6FE"/>
      <stop offset="42%" stop-color="#A78BFA"/>
      <stop offset="65%" stop-color="#8B5CF6"/>
      <stop offset="85%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </radialGradient>

    <!-- Text gradients -->
    <linearGradient id="wordmarkG" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="40%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="taglineG" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="markBlur" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gapBlur" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="outer"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="inner"/>
      <feMerge><feMergeNode in="outer"/><feMergeNode in="inner"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>

    <!-- Border gradient -->
    <linearGradient id="borderG" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="25%" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="75%" stop-color="#8B5CF6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="900" height="320" rx="16" fill="url(#bgCore)"/>

  <!-- Ambient glow orbs -->
  <rect width="900" height="320" rx="16" fill="url(#glowOrb1)"/>
  <rect width="900" height="320" rx="16" fill="url(#glowOrb2)"/>
  <rect width="900" height="320" rx="16" fill="url(#glowOrb3)"/>

  <!-- Starfield -->
  <g filter="url(#starGlow)">
    <circle cx="120" cy="45" r="1" fill="#C4B5FD" fill-opacity="0.5"/>
    <circle cx="340" cy="28" r="0.8" fill="#EDE9FE" fill-opacity="0.4"/>
    <circle cx="520" cy="55" r="1.2" fill="#A78BFA" fill-opacity="0.35"/>
    <circle cx="760" cy="38" r="0.7" fill="#DDD6FE" fill-opacity="0.45"/>
    <circle cx="830" cy="80" r="0.9" fill="#C4B5FD" fill-opacity="0.3"/>
    <circle cx="60" cy="180" r="0.8" fill="#EDE9FE" fill-opacity="0.3"/>
    <circle cx="180" cy="260" r="1" fill="#A78BFA" fill-opacity="0.25"/>
    <circle cx="400" cy="290" r="0.7" fill="#C4B5FD" fill-opacity="0.35"/>
    <circle cx="650" cy="275" r="1.1" fill="#DDD6FE" fill-opacity="0.3"/>
    <circle cx="820" cy="250" r="0.6" fill="#EDE9FE" fill-opacity="0.4"/>
    <circle cx="280" cy="140" r="0.5" fill="#C4B5FD" fill-opacity="0.3"/>
    <circle cx="580" cy="180" r="0.6" fill="#A78BFA" fill-opacity="0.25"/>
    <circle cx="700" cy="120" r="0.8" fill="#DDD6FE" fill-opacity="0.35"/>
    <circle cx="45" cy="100" r="0.7" fill="#A78BFA" fill-opacity="0.3"/>
    <circle cx="850" cy="160" r="0.5" fill="#C4B5FD" fill-opacity="0.4"/>
    <circle cx="480" cy="130" r="0.6" fill="#EDE9FE" fill-opacity="0.2"/>
    <circle cx="150" cy="195" r="0.9" fill="#DDD6FE" fill-opacity="0.25"/>
    <circle cx="360" cy="230" r="0.5" fill="#C4B5FD" fill-opacity="0.3"/>
    <circle cx="610" cy="245" r="0.7" fill="#A78BFA" fill-opacity="0.2"/>
    <circle cx="740" cy="295" r="0.8" fill="#EDE9FE" fill-opacity="0.3"/>
  </g>

  <!-- Faint starfield (no glow) -->
  <circle cx="95" cy="68" r="0.4" fill="#A78BFA" fill-opacity="0.2"/>
  <circle cx="230" cy="32" r="0.3" fill="#C4B5FD" fill-opacity="0.15"/>
  <circle cx="440" cy="72" r="0.4" fill="#DDD6FE" fill-opacity="0.15"/>
  <circle cx="680" cy="58" r="0.3" fill="#A78BFA" fill-opacity="0.2"/>
  <circle cx="320" cy="185" r="0.3" fill="#C4B5FD" fill-opacity="0.15"/>
  <circle cx="550" cy="210" r="0.4" fill="#DDD6FE" fill-opacity="0.12"/>
  <circle cx="790" cy="195" r="0.3" fill="#A78BFA" fill-opacity="0.18"/>
  <circle cx="110" cy="285" r="0.4" fill="#C4B5FD" fill-opacity="0.15"/>
  <circle cx="500" cy="260" r="0.3" fill="#DDD6FE" fill-opacity="0.12"/>
  <circle cx="870" cy="290" r="0.4" fill="#A78BFA" fill-opacity="0.2"/>

  <!-- Logo mark -->
  <g transform="translate(330, 55) scale(0.9)" filter="url(#markBlur)">
    <rect x="14" y="8" width="18" height="100" rx="4" fill="url(#markG)"/>
    <rect x="38" y="114" width="56" height="18" rx="4" fill="url(#markG)"/>
  </g>
  <g transform="translate(330, 55) scale(0.9)" filter="url(#gapBlur)">
    <circle cx="35" cy="118" r="2" fill="white" fill-opacity="0.88"/>
  </g>

  <!-- Wordmark -->
  <text x="440" y="118" font-family="'Sora', 'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" letter-spacing="-0.02em" fill="url(#wordmarkG)">Liminal Labs</text>

  <!-- Tagline -->
  <text x="450" y="155" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" letter-spacing="0.03em" fill="url(#taglineG)">Talk with your system. Evolve without limits.</text>

  <!-- Accent line -->
  <line x1="350" y1="178" x2="550" y2="178" stroke="url(#accentLine)" stroke-width="1"/>

  <!-- Description -->
  <text x="450" y="210" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" fill="#7C6BAD" fill-opacity="0.85">
    <tspan x="450" dy="0">Describe changes in plain English. Preview instantly.</tspan>
    <tspan x="450" dy="22">Ship with confidence. No code required.</tspan>
  </text>

  <!-- Tech badges row -->
  <g transform="translate(248, 252)">
    <!-- Next.js -->
    <rect x="0" y="0" width="68" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="0.8"/>
    <text x="34" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#C4B5FD">Next.js</text>

    <!-- React -->
    <rect x="78" y="0" width="58" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="0.8"/>
    <text x="107" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#C4B5FD">React</text>

    <!-- TypeScript -->
    <rect x="146" y="0" width="86" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="0.8"/>
    <text x="189" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#C4B5FD">TypeScript</text>

    <!-- Supabase -->
    <rect x="242" y="0" width="78" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="0.8"/>
    <text x="281" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#C4B5FD">Supabase</text>

    <!-- Stripe -->
    <rect x="330" y="0" width="58" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="0.8"/>
    <text x="359" y="17" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="#C4B5FD">Stripe</text>
  </g>

  <!-- Border -->
  <rect width="900" height="320" rx="16" fill="none" stroke="url(#borderG)" stroke-width="1"/>
</svg>
